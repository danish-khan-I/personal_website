<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Danish — ( ˈdeɪnɪʃ/ )</title>
  <meta name="description" content="A small room. A crow lives here." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' shape-rendering='crispEdges'%3E%3Crect width='16' height='16' fill='%230a0e1a'/%3E%3Crect x='5' y='4' width='6' height='2' fill='%230d0d12'/%3E%3Crect x='4' y='6' width='9' height='6' fill='%230d0d12'/%3E%3Crect x='13' y='8' width='2' height='1' fill='%233a2a18'/%3E%3Crect x='10' y='7' width='1' height='1' fill='%23ffd966'/%3E%3Crect x='6' y='12' width='1' height='2' fill='%233a2a18'/%3E%3Crect x='9' y='12' width='1' height='2' fill='%233a2a18'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="stage">
    <canvas id="room" width="320" height="180"></canvas>
  </div>

  <div id="hud">
    <button id="mute" aria-label="Toggle sound" title="sound">♪</button>
    <div id="hint" aria-live="polite"></div>
  </div>

  <div id="overlay" class="hidden" aria-hidden="true">
    <button id="close" aria-label="Close">×</button>
    <div id="vignette"></div>
  </div>

  <noscript>
    <p style="color:#e8e6d8;font-family:monospace;padding:2rem">this room needs javascript to open.</p>
  </noscript>

  <script type="module" src="main.js"></script>
</body>
</html>
